<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>
    <section>
        <div class="container-fluid mt-4 p-3">
            <div class="row">
                <p class="text-center fs-3 mt-4">Cart Page</p>
                <hr>
                <a href="/products" class="text-decoration-none"><i
                    class="fa-solid fa-arrow-left"></i> Back</a>
                <th:block th:if="${session.succMsg}">
                    <p class="text-success fw-bold">[[${session.succMsg}]]</p>
                    <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
                </th:block>

                <th:block th:if="${session.errorMsg}">
                    <p class="text-danger fw-bold">[[${session.errorMsg}]]</p>
                    <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                </th:block>

                <th:block th:if="${session.errorMsg}">
                    <p class="text-danger fw-bold text-center">[[${session.errorMsg}]]</p>
                    <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                </th:block>
                <div class="col-md-4 p-3">

                    

                </div>


                <!-- <div class="card card-sh">-->
                <div class="p-3">
                    <table class="table table-bordered">
                        <thead class="table-light ">
                            <tr class=text-center>
                                <th scope="col">Sl No</th>
                                <th scope="col">Image</th>
                                <th scope="col">Product name</th>
                                
                                <th scope="col">Price</th>
                                <th scope="col">Quantity</th>
                                <th scope="col">Total Price</th>
                                
                            </tr>
                        </thead>
                        <tbody>
                            <tr class=text-center th:each="cart,c:${carts}">
                                <th scope="row">[[${c.count}]]</th>
                                <td><img th:src="${cart.product.image}"
                                    width="70px" height="70px"></td>
                                <td>[[${cart.product.title}]]</td>
                                <td>[[${cart.product.discountPrice}]]</td>
                                 <td class="text-center">
                                 <a th:href="@{'/user/cartQuantityUpdate?sy=de&cid='+${cart.id}}"><i class="fa-solid fa-circle-minus"></i></a>
                                  [[${cart.quantity}]] 
                                  <a th:href="@{'/user/cartQuantityUpdate?sy=in&cid='+${cart.id}}"><i class="fa-solid fa-circle-plus">
                                 </i></a></td> 
                              <td>&#8377 [[${cart.totalPrice}]]</td>
                                
                                
                            </tr>
<tr>
<td colspan="4"></td>
<td class="fw-bold">Total Price</td>
<td  class="fw-bold" th:text="&#8377 + ${totalOrderPrice}"></td>
</tr>
<tr>

                        </tbody>
                    </table>
<div class="text-center">
<a href="/user/orders" class="btn btn-warning fw-bold">Proceed to Pay</a></div>
                </div>
            </div>
        </div>
        
    </section>
</body>
</html>
