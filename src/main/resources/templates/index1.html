<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::section})}">
<head>
    <meta charset="UTF-8" />
    <title>Ecom Store</title>
</head>
<body>
<section>

    <!-- ALL STYLES INSIDE SECTION so Thymeleaf fragment includes them -->
    <style>
        section { padding-top: 56px; }

        .announce-strip {
            background: #0f0e0d;
            color: #e8d5a3;
            text-align: center;
            padding: .45rem 1rem;
            font-size: .72rem;
            letter-spacing: .14em;
            text-transform: uppercase;
        }

        /* CAROUSEL */
        #mainCarousel { width: 100%; }
        #mainCarousel .carousel-inner { width: 100%; }
        #mainCarousel .carousel-item img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
        }

        /* SECTION HEADING */
        .sec-head { text-align: center; margin-bottom: 2rem; }
        .sec-head .tag {
            display: block;
            font-size: .68rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: #c9a84c;
            margin-bottom: .3rem;
        }
        .sec-head h2 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #0f0e0d;
            margin: 0;
        }
        .sec-head .rule {
            width: 40px;
            height: 2px;
            background: #c9a84c;
            margin: .6rem auto 0;
        }

        /* CATEGORIES */
        .cat-section { background: #fdfaf6; padding: 3rem 0 2.5rem; }
        .cat-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
        }
        .cat-item {
            width: 110px;
            text-align: center;
            text-decoration: none;
            color: #0f0e0d;
            display: block;
            transition: transform .28s;
        }
        .cat-item:hover { transform: translateY(-5px); color: #0f0e0d; text-decoration: none; }
        .cat-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #f8f4ef;
            border: 2px solid #e0d8ce;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto .65rem;
            overflow: hidden;
            transition: border-color .28s, box-shadow .28s;
        }
        .cat-item:hover .cat-circle {
            border-color: #c9a84c;
            box-shadow: 0 6px 20px rgba(201,168,76,.25);
        }
        .cat-circle img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            display: block;
        }
        .cat-item span {
            font-size: .8rem;
            font-weight: 500;
        }

        /* PRODUCTS */
        .prod-section { background: #f8f4ef; padding: 3rem 0 4rem; }
        .prod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.25rem;
        }
        .prod-card {
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            text-decoration: none;
            color: #0f0e0d;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
            transition: transform .28s, box-shadow .28s;
            display: block;
        }
        .prod-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(0,0,0,.12);
            text-decoration: none;
            color: #0f0e0d;
        }
        .prod-img {
            position: relative;
            height: 180px;
            background: #f8f4ef;
            overflow: hidden;
        }
        .prod-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .4s ease;
        }
        .prod-card:hover .prod-img img { transform: scale(1.05); }
        .prod-badge {
            position: absolute;
            top: .6rem; left: .6rem;
            background: #c9a84c;
            color: #fff;
            font-size: .58rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .15rem .45rem;
            border-radius: 2px;
        }
        .prod-body {
            padding: .75rem .9rem .85rem;
            border-top: 1px solid #f0ebe3;
        }
        .prod-body p {
            font-size: .85rem;
            font-weight: 500;
            line-height: 1.35;
            margin: 0;
            color: #0f0e0d;
        }
    </style>

    <!-- Announcement Bar -->
    <div class="announce-strip">
        Free shipping on orders over ₹999 &nbsp;·&nbsp; New arrivals every week
    </div>

    <!-- Carousel -->
    <div id="mainCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3500">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="0" class="active" aria-current="true"></button>
            <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/img/ecom5.png" alt="Slide 1">
            </div>
            <div class="carousel-item">
                <img src="/img/ecom2.jpg" alt="Slide 2">
            </div>
            <div class="carousel-item">
                <img src="/img/ecom3.jpg" alt="Slide 3">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- Categories -->
    <div class="cat-section">
        <div class="container">
            <div class="sec-head">
                <span class="tag">Browse By</span>
                <h2>Shop Categories</h2>
                <div class="rule"></div>
            </div>
            <div class="cat-row">
                <div th:each="c : ${category}">
                    <a th:href="@{'/products?category='+${c.name}}" class="cat-item">
                        <div class="cat-circle">
                            <img th:src="${c.imgName}" th:alt="${c.name}" />
                        </div>
                        <span th:text="${c.name}"></span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Latest Products -->
    <div class="prod-section">
        <div class="container">
            <div class="sec-head">
                <span class="tag">Just In</span>
                <h2>Latest Products</h2>
                <div class="rule"></div>
            </div>
            <div class="prod-grid">
                <div th:each="p : ${products}">
                    <a th:href="@{'/product/'+${p.id}}" class="prod-card">
                        <div class="prod-img">
                            <span class="prod-badge">New</span>
                            <img th:src="${p.image}" th:alt="${p.title}" />
                        </div>
                        <div class="prod-body">
                            <p th:text="${p.title}"></p>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
