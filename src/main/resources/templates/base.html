<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8" />
    <title>Ecom Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* ── NAVBAR ── */
        .navbar-luxury {
            background: #0f0e0d !important;
            border-bottom: 2px solid #c9a84c;
            padding-top: .6rem;
            padding-bottom: .6rem;
        }

        .navbar-luxury .navbar-brand {
            color: #c9a84c !important;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: .04em;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .navbar-luxury .navbar-brand:hover { color: #e8d5a3 !important; }
        .navbar-luxury .navbar-brand i { font-size: 1rem; }

        .navbar-luxury .nav-link {
            color: #d4c9b8 !important;
            font-size: .88rem;
            letter-spacing: .03em;
            padding-left: .9rem !important;
            padding-right: .9rem !important;
            transition: color .2s;
        }
        .navbar-luxury .nav-link:hover,
        .navbar-luxury .nav-link.active {
            color: #c9a84c !important;
        }

        .navbar-luxury .dropdown-menu {
            background: #1a1916;
            border: 1px solid #3a3628;
            border-radius: 4px;
            margin-top: .3rem;
        }
        .navbar-luxury .dropdown-item {
            color: #d4c9b8;
            font-size: .85rem;
            padding: .45rem 1.1rem;
            transition: background .2s, color .2s;
        }
        .navbar-luxury .dropdown-item:hover {
            background: #2a2720;
            color: #c9a84c;
        }

        /* Cart badge */
        .navbar-luxury .cart-link {
            color: #c9a84c !important;
            font-weight: 600;
        }
        .navbar-luxury .cart-link:hover { color: #e8d5a3 !important; }

        /* Toggler */
        .navbar-luxury .navbar-toggler {
            border-color: #3a3628;
        }
        .navbar-luxury .navbar-toggler-icon {
            filter: invert(1) sepia(1) saturate(2) hue-rotate(5deg);
        }

        /* Footer */
        .footer-luxury {
            background: #0f0e0d !important;
            border-top: 2px solid #c9a84c;
            color: #e8d5a3 !important;
        }
    </style>
</head>
<body style="background:#fdfaf6;">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-luxury">
        <div class="container-fluid">
            <a class="navbar-brand" href="/home">
                <i class="fa-solid fa-cart-shopping"></i> Ecom Store
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarMain" aria-controls="navbarMain"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMain">
                <!-- Left links -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="/home">
                            <i class="fa-solid fa-house"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/products">Products</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="/" role="button"
                           data-bs-toggle="dropdown" aria-expanded="false">Category</a>
                        <ul class="dropdown-menu">
                            <li th:each="c:${category}">
                                <a class="dropdown-item"
                                   th:href="@{'/products?category='+${c.name}}">[[${c.name}]]</a>
                            </li>
                        </ul>
                    </li>
                </ul>

                <!-- Right links -->
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <th:block th:if="${user == null}">
                        <li class="nav-item">
                            <a class="nav-link" href="/signin">
                                <i class="fa-solid fa-arrow-right-to-bracket"></i> Login
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/register">Register</a>
                        </li>
                    </th:block>

                    <th:block th:if="${user != null}">
                        <li class="nav-item" th:if="${user.role != 'ROLE_ADMIN'}">
                            <a class="nav-link cart-link" href="/user/cart">
                                <i class="fa-solid fa-cart-shopping"></i>
                                Cart [ [[${countCart}]] ]
                            </a>
                        </li>
                        <li class="nav-item" th:if="${user.role == 'ROLE_ADMIN'}">
                            <a class="nav-link" href="/admin/index">Admin Dashboard</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button"
                               data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="fa-solid fa-user"></i> [[${user.name}]]
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li th:if="${user.role=='ROLE_USER'}">
                                    <a class="dropdown-item" href="/user/profile">Profile</a>
                                </li>
                                <li th:if="${user.role=='ROLE_ADMIN'}">
                                    <a class="dropdown-item" href="/admin/profile">Profile</a>
                                </li>
                                <li th:if="${user.role=='ROLE_USER'}">
                                    <a class="dropdown-item" href="/user/user-orders">My Orders</a>
                                </li>
                                <li>
                                    <a class="dropdown-item" href="/logout">
                                        Logout <i class="fa-solid fa-arrow-right-to-bracket"></i>
                                    </a>
                                </li>
                            </ul>
                        </li>
                    </th:block>
                </ul>
            </div>
        </div>
    </nav>

    <div th:replace="${content}"></div>

    <!-- Footer -->
    <footer class="fixed-bottom footer-luxury text-center p-1">
        <p class="mb-0" style="font-size:.8rem; letter-spacing:.05em;">© 2026 Shopping Cart</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="text/javascript" src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
