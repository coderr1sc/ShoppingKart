<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::section})}">
<head>
    <meta charset="UTF-8" />
    <title>index</title>
</head>
<body>
    <section>
    <div class="conatiner mt-5 p-5">
    <div class="row">
    <div class="col-md-6 p-5">
    <img src="/img/ecom.png" width="100%" height="400px"  alt="" />
    </div>
    
    <div class="col-md-6 mt-3 p-5">
    
    <div class="card shadow p-3 mb-5 bg-body-tertiary rounded" >
    
    <div class="card-header">
    <p class="fs-4 text-center">Login</p>
    
    
    <div th:if="${param.error}" class="alert alert-danger text-center">
    [[${session.SPRING_SECURITY_LAST_EXCEPTION.message}]]
    
    </div>
    <div th:if="${param.logout}" class="alert alert-success text-center">
    Logout Successful
    </div>
    </div>
    
    
    <div class="card-body">
    
    
    <form action="/login" method="post">
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" name = "username" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1"  class="form-label">Password</label>
    <input type="password" name = "password" class="form-control" id="exampleInputPassword1">
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">Check me out</label>
  </div>
  <button type="submit" class="btn btn-primary">Login</button>
</form>
    
    </div>
    <div class="card-footer text-center">
    <a href="/forgot-password"class="text-decoration-none">Forgot password</a><br>
    Don't have an account? <a href="/register" class="text-decoration-none">Create One</a>
    
    </div>
    </div>
    </div>
    </div>
    </div>
    </section>
</body>
</html>
