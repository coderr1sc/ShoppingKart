<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::section})}">
<head>
	<meta charset="UTF-8" />
	<title>Document</title>
</head>
<body>
    <section>
	<div class="conatiner p-5 mt-5">
	<div class="row">
	<div class="col-md-8 offset-md-2 ">
	<div class="card mt-2 ">
	   <div class="card-header text-center fw-bold">
	   <p class="fs-4">Add Product</p>
	   
	   <th:block th:if="${session.succMsg}">
    <p class="text-success fw-bold">[[${session.succMsg}]]    </p>
    <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
    </th:block>
    <th:block th:if="${session.errorMsg}">
    <p class="text-danger fw-bold">[[${session.errorMsg}]]    </p>
        <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
    </th:block>
	   
	   </div>
	   
	   
	   
	
	
	   
	       <div class="card-body">
	       
	       <form action="/admin/saveProduct" method="post" enctype="multipart/form-data">
	       <div class="mb-3">
	       <label>Enter Title</label><input type="text"  name="title" class="form-control"/>
	       </div>
	       <div class="mb-3">
           <textarea name="description" id="" cols="" rows="3" class="form-control"></textarea>
           </div>
           
           <div class="mb-3">
           <label>Category</label> 
           <select class="form-control" name="category">
           <option>--select--</option>
           <option th:each="c:${categories}">[[${c.name}]]</option>
           
           </select>
           </div>
           
           <div class="mb-3">
           <label>Enter price</label><input type="number" name="price" 
           class="form-control">
           </div>
           
		   <div class="mb-3">
		    <label>Status</label> <div class="form-check">
		  <input class="form-check-input" type="radio" name="isActive" id="radioDefault1" value="true" checked>
		  <label class="form-check-label" for="radioDefault1">
		    Active
		  </label>
		</div>
		<div class="form-check">
		  <input class="form-check-input" type="radio" name="isActive" id="radioDefault2" value="false" >
		  <label class="form-check-label" for="radioDefault2">
		   Inactive
		  </label>
		</div>
		    </div>
           
           <div class="row">
           
           <div class="mb-3 col">
           <label for="">Enter Stocks</label><input type="number" name="stock"
            class="form-control">
           </div>
           
           <div class="mb-3 col">
           <label for="">Upload Image</label><input type="file" name="file"
            class="form-control">
           </div>
           
           </div>
           <button class="btn btn-primary col-md-12">Submit</button>
	       </form>
	       </div>
	</div>
	</div>
	</div>
	</div>
	
	
	</section>
</body>
</html>
