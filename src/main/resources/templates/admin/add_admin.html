<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::section})}">
<head>
    <meta charset="UTF-8" />
    <title>index</title>
</head>
<body>

    <section>
    <div class="conatiner mt-5 p-5">
    <div class="row">
    <div class="col-md-6 p-5">
    <img src="/img/ecom.png" width="100%" height="400px"  alt="" />
    </div>
    
    <div class="col-md-6  p-5">
    
    <div class="card shadow p-3 mb-5 bg-body-tertiary rounded" >
    
    <div class="card-header text-center">
    <p class="fs-4 fw-bold text-center">Register Admin</p>
    <th:block th:if="${session.succMsg}">
    <p class="text-success fw-bold">[[${session.succMsg}]]    </p>
    <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
    </th:block>
    <th:block th:if="${session.errorMsg}">
    <p class="text-danger fw-bold">[[${session.errorMsg}]]    </p>
        <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
    </th:block>
    </div>
    <div class="card-body">
    
    
    <form action="/admin/saveAdmin" method="post" enctype="multipart/form-data" >
    <div class="row">
  <div class="col">
    <label for="exampleInputEmail1" class="form-label">Full Name</label>
    <input type="text" class="form-control" id="name" name="name" aria-describedby="emailHelp" required>
  </div>
  
  
  <div class="col">
    <label for="exampleInputPassword1" class="form-label">Mobile Number</label>
    <input type="number" class="form-control" id="mobile" name="mobileNumber" aria-describedby="emailHelp">
  </div>
  
  </div>
  
  
  <div class="row">
  <div class="col">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email"  name="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
  </div>
  
  
  <div class="col">
    <label for="exampleInputPassword1" class="form-label">Address</label>
    <input type="text" name="address" class="form-control" id="exampleInputPassword1">
  </div>
  
  </div>
  
  <div class="row">
  <div class="col">
    <label for="exampleInputEmail1" class="form-label">City</label>
    <input type="text"  name="city"class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
  </div>
  
  
  <div class="col">
    <label for="exampleInputPassword1" class="form-label">State</label>
    <input type="text" name="state" class="form-control" id="exampleInputPassword1">
  </div>
  
  </div>
  
  
  <div class="row">
  <div class="col">
    <label for="exampleInputEmail1" class="form-label">Pin Code</label>
    <input type="text" name="pincode" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
  </div>
  
  
  <div class="col">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" name="password" id="exampleInputPassword1">
  </div>
  
  </div>
  
  <div class="col">
    <label for="exampleInputPassword1" class="form-label">Profile Image</label>
    <input type="file" class="form-control" id="exampleInputPassword1" name="img">
  </div>
  
  <button type="submit" class="btn btn-primary mt-2">Register</button>
</form>
    
    </div>
    <div class="card-footer text-center">
     Have an account? <a href="/login" class="text-decoration-none">Login</a>
    
    </div>
    </div>
    </div>
    </div>
    </div>
    
    </section>
</body>
</html>
